; PlatformIO Project Configuration File
; ESP32-WROOM-32E 步进电机调速仪
; 
; 硬件配置:
; - MCU: ESP32-WROOM-32E (双核 240MHz)
; - 驱动: DRV8825 步进电机驱动
; - 电机: 17HS3401S (1.8°步距角, 200步/圈)
; - 传动: 2GT同步带 20齿惰轮 (节距2mm)
; - 行程: 最大400mm
; - 电源: 12V
;
; 作者: GitHub Copilot
; 日期: 2026-01-19

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino

; 库依赖
lib_deps = 
    adafruit/Adafruit SSD1306@^2.5.7
    adafruit/Adafruit GFX Library@^1.11.9
    bogde/HX711@^0.7.5

monitor_speed = 115200
upload_speed = 460800
