; PlatformIO Project Configuration File
; ESP32-WROOM-32E 步进电机调速仪
; 
; 硬件配置:
; - MCU: ESP32-WROOM-32E (双核 240MHz)
; - 驱动: DRV8825 步进电机驱动
; - 电机: 17HS3401S (1.8°步距角, 200步/圈)
; - 传动: 绕线轴 (直径 7mm)
; - 传感: HX711 + 称重传感器
; - 显示: SSD1306 OLED (I2C)
; - 通信: BLE / Phyphox

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino

; 库依赖
lib_deps = 
    adafruit/Adafruit SSD1306@^2.5.7
    adafruit/Adafruit GFX Library@^1.11.9
    bogde/HX711@^0.7.5

monitor_speed = 115200
upload_speed = 460800
